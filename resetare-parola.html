<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetare Parolă | U Cluj Handbal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-shield-halved me-2"></i>U CLUJ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars text-white"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="mainMenu">
                    <li class="nav-item"><a class="nav-link" href="index.html">Acasă</a></li>
                    <li class="nav-item"><a class="nav-link" href="stiri.html">Știri</a></li>
                    <li class="nav-item"><a class="nav-link" href="meciuri.html">Meciuri</a></li>
                    <li class="nav-item"><a class="nav-link" href="clasament.html">Clasament</a></li>
                    <li class="nav-item"><a class="nav-link" href="lot.html">Lot Echipa</a></li>
                    <li class="nav-item"><a class="nav-link" href="bilete.html"><i class="fa-solid fa-ticket me-1"></i> Bilete</a></li>
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-white" href="autentificare.html" id="authLinkBtn">
                            <i class="fa-regular fa-user me-1"></i> Contul Meu
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-overlay"></div>
        <div class="container position-relative" style="z-index: 2;">
            <div class="row justify-content-center align-items-center" style="min-height: 100vh; padding-top: 80px;">
                <div class="col-md-8 col-lg-5" data-aos="zoom-in" data-aos-duration="600">
                    
                    <div class="auth-card shadow-lg">
                        
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-lock-open fa-3x mb-3" style="color: var(--u-black);"></i>
                            <h3 class="fw-bold text-uppercase">Resetare Parolă</h3>
                            <p class="text-muted small">Introdu adresa de email asociată contului tău și îți vom trimite un link pentru resetarea parolei.</p>
                        </div>

                        <form id="resetForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase">Email</label>
                                <input type="email" id="resetEmail" class="form-control auth-input" placeholder="nume@email.com" required>
                            </div>
                            
                            <button type="submit" class="btn btn-auth w-100 mt-2">Trimite link de resetare</button>
                            
                            <p class="text-center mt-4 small">
                                <a href="autentificare.html" class="text-dark fw-bold text-decoration-none">
                                    <i class="fa-solid fa-arrow-left me-1"></i> Înapoi la autentificare
                                </a>
                            </p>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="./js/main.js"></script>
    
    <script>
        // Opțional: Gestionează trimiterea formularului de resetare
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            alert('Un email de resetare a fost trimis către: ' + email);
            // Aici poți adăuga logica de trimitere către backend
        });
    </script>
</body>
</html>
