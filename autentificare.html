<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare | U Cluj Handbal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-shield-halved me-2"></i>U CLUJ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars text-white"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="mainMenu">
                    <li class="nav-item"><a class="nav-link" href="index.html">Acasă</a></li>
                    <li class="nav-item"><a class="nav-link" href="stiri.html">Știri</a></li>
                    <li class="nav-item"><a class="nav-link" href="meciuri.html">Meciuri</a></li>
                    <li class="nav-item"><a class="nav-link" href="clasament.html">Clasament</a></li>
                    <li class="nav-item"><a class="nav-link" href="lot.html">Lot Echipa</a></li>
                    <li class="nav-item"><a class="nav-link" href="bilete.html"><i class="fa-solid fa-ticket me-1"></i> Bilete</a></li>
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-white" href="autentificare.html" id="authLinkBtn">
                            <i class="fa-regular fa-user me-1"></i> Contul Meu
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-overlay"></div>
        <div class="container position-relative" style="z-index: 2;">
            <div class="row justify-content-center align-items-center" style="min-height: 100vh; padding-top: 80px;">
                <div class="col-md-8 col-lg-5" data-aos="zoom-in" data-aos-duration="600">
                    
                    <div class="auth-card shadow-lg">
                        
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-shield-halved fa-3x mb-3" style="color: var(--u-black);"></i>
                            <h3 class="fw-bold text-uppercase" id="authTitle">Autentificare</h3>
                            <p class="text-muted small" id="authSubtitle">Bine ai revenit! Loghează-te pentru a continua.</p>
                        </div>

                        <div class="d-grid gap-2 mb-4">
                            <button id="btnGoogle" class="btn btn-social btn-google fw-bold">
                                <i class="fa-brands fa-google text-danger me-2"></i> Continuă cu Google
                            </button>
                            <button id="btnFacebook" class="btn btn-social btn-facebook fw-bold">
                                <i class="fa-brands fa-facebook-f text-primary me-2"></i> Continuă cu Facebook
                            </button>
                        </div>

                        <div class="auth-divider mb-4">
                            <span class="text-muted small px-2 bg-white">sau cu adresa de email</span>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase">Email</label>
                                <input type="email" id="loginEmail" class="form-control auth-input" placeholder="nume@email.com" required>
                            </div>
                            <div class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <label class="form-label small fw-bold text-uppercase">Parolă</label>
                                    <a href="resetare-parola.html" class="small text-dark text-decoration-none">Ai uitat parola?</a>
                                </div>
                                <input type="password" class="form-control auth-input" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-auth w-100 mt-3">Intră în cont</button>
                            <p class="text-center mt-4 small">
                                Nu ai cont? <a href="#" class="text-dark fw-bold" onclick="toggleAuthMode('register'); return false;">Creează unul acum</a>
                            </p>
                        </form>

                        <form id="registerForm" style="display: none;">
                            <div class="row g-2">
                                <div class="col-6 mb-3">
                                    <label class="form-label small fw-bold text-uppercase">Nume</label>
                                    <input type="text" id="regNume" class="form-control auth-input" placeholder="Ex: Popescu" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label small fw-bold text-uppercase">Prenume</label>
                                    <input type="text" id="regPrenume" class="form-control auth-input" placeholder="Ex: Ion" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase">Email</label>
                                <input type="email" id="regEmail" class="form-control auth-input" placeholder="nume@email.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-uppercase">Parolă</label>
                                <input type="password" id="regPass" class="form-control auth-input" placeholder="Creează o parolă puternică" required>
                            </div>
                            <button type="submit" class="btn btn-auth w-100 mt-3">Înregistrare</button>
                            <p class="text-center mt-4 small">
                                Ai deja cont? <a href="#" class="text-dark fw-bold" onclick="toggleAuthMode('login'); return false;">Loghează-te aici</a>
                            </p>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="./js/main.js"></script>

    <script>
        document.getElementById('btnGoogle').addEventListener('click', function() {
            // Aici vei integra SDK-ul de la Google (ex: Firebase Auth sau Google Identity Services)
            alert('Redirecționare către serviciul de autentificare Google...');
            // window.location.href = "URL_PROVIDER_GOOGLE"; 
        });

        document.getElementById('btnFacebook').addEventListener('click', function() {
            // Aici vei integra SDK-ul de la Facebook
            alert('Redirecționare către serviciul de autentificare Facebook...');
            // window.location.href = "URL_PROVIDER_FACEBOOK";
        });
    </script>
</body>
</html>
